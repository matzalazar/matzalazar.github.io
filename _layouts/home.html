---
layout: default
---

<section class="home-hero">
  <div class="hero-main">
    <div class="hero-text">
      <h1>Ingeniería de software enfocada en resultados.</h1>
      <p class="home-desc">Especialista en sistemas robustos, automatización estratégica y arquitectura de datos. Soluciones técnicas estables, seguras y escalables.</p>
    </div>
    <div class="hero-visual">
      <svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Background: concentric circles -->
        <circle cx="120" cy="120" r="100" stroke="var(--base-color)" stroke-opacity="0.05" stroke-width="0.5"/>
        <circle cx="120" cy="120" r="55"  stroke="var(--base-color)" stroke-opacity="0.05" stroke-width="0.5"/>
        <!-- Axis lines -->
        <line x1="20"  y1="120" x2="220" y2="120" stroke="var(--base-color)" stroke-opacity="0.06" stroke-width="0.5"/>
        <line x1="120" y1="20"  x2="120" y2="220" stroke="var(--base-color)" stroke-opacity="0.06" stroke-width="0.5"/>
        <!-- Outer ring -->
        <line x1="120" y1="50"  x2="185" y2="85"  stroke="var(--base-color)" stroke-opacity="0.1" stroke-width="0.5"/>
        <line x1="185" y1="85"  x2="195" y2="155" stroke="var(--base-color)" stroke-opacity="0.1" stroke-width="0.5"/>
        <line x1="195" y1="155" x2="145" y2="205" stroke="var(--base-color)" stroke-opacity="0.1" stroke-width="0.5"/>
        <line x1="145" y1="205" x2="65"  y2="195" stroke="var(--base-color)" stroke-opacity="0.1" stroke-width="0.5"/>
        <line x1="65"  y1="195" x2="40"  y2="140" stroke="var(--base-color)" stroke-opacity="0.1" stroke-width="0.5"/>
        <line x1="40"  y1="140" x2="55"  y2="70"  stroke="var(--base-color)" stroke-opacity="0.1" stroke-width="0.5"/>
        <line x1="55"  y1="70"  x2="120" y2="50"  stroke="var(--base-color)" stroke-opacity="0.1" stroke-width="0.5"/>
        <!-- Spokes from center -->
        <line x1="120" y1="120" x2="120" y2="50"  stroke="var(--base-color)" stroke-opacity="0.18" stroke-width="1"/>
        <line x1="120" y1="120" x2="185" y2="85"  stroke="var(--base-color)" stroke-opacity="0.18" stroke-width="1"/>
        <line x1="120" y1="120" x2="195" y2="155" stroke="var(--base-color)" stroke-opacity="0.18" stroke-width="1"/>
        <line x1="120" y1="120" x2="145" y2="205" stroke="var(--base-color)" stroke-opacity="0.18" stroke-width="1"/>
        <line x1="120" y1="120" x2="65"  y2="195" stroke="var(--base-color)" stroke-opacity="0.18" stroke-width="1"/>
        <line x1="120" y1="120" x2="40"  y2="140" stroke="var(--base-color)" stroke-opacity="0.18" stroke-width="1"/>
        <line x1="120" y1="120" x2="55"  y2="70"  stroke="var(--base-color)" stroke-opacity="0.18" stroke-width="1"/>
        <!-- Accent diagonal connection -->
        <line x1="185" y1="85"  x2="65"  y2="195" stroke="var(--accent-warm)" stroke-opacity="0.25" stroke-width="0.8"/>
        <!-- Mid-ring hint nodes -->
        <circle cx="120" cy="85"  r="1.5" fill="var(--base-color)" opacity="0.2"/>
        <circle cx="152" cy="103" r="1.5" fill="var(--base-color)" opacity="0.2"/>
        <circle cx="157" cy="138" r="1.5" fill="var(--base-color)" opacity="0.2"/>
        <circle cx="133" cy="163" r="1.5" fill="var(--base-color)" opacity="0.2"/>
        <circle cx="93"  cy="158" r="1.5" fill="var(--base-color)" opacity="0.2"/>
        <circle cx="80"  cy="130" r="1.5" fill="var(--base-color)" opacity="0.2"/>
        <circle cx="88"  cy="96"  r="1.5" fill="var(--base-color)" opacity="0.2"/>
        <!-- Center node -->
        <circle cx="120" cy="120" r="5"   fill="var(--base-color)" opacity="0.4"/>
        <!-- Outer nodes -->
        <circle cx="120" cy="50"  r="3"   fill="var(--base-color)" opacity="0.25"/>
        <circle cx="195" cy="155" r="3"   fill="var(--base-color)" opacity="0.25"/>
        <circle cx="145" cy="205" r="3"   fill="var(--base-color)" opacity="0.25"/>
        <circle cx="40"  cy="140" r="3"   fill="var(--base-color)" opacity="0.25"/>
        <circle cx="55"  cy="70"  r="3"   fill="var(--base-color)" opacity="0.25"/>
        <!-- Accent nodes (endpoints of the warm diagonal) -->
        <circle cx="185" cy="85"  r="4"   fill="var(--accent-warm)" opacity="0.7"/>
        <circle cx="65"  cy="195" r="4"   fill="var(--accent-warm)" opacity="0.7"/>
      </svg>
    </div>
  </div>
  <div class="hero-footer">
    <div class="home-services-ref" aria-label="Especialidades">
      <span class="home-service-pill">Optimización</span>
      <span class="home-service-pill">Infraestructura</span>
      <span class="home-service-pill">Desarrollo</span>
    </div>
    <a href="{{ '/contacto' | relative_url }}" class="hero-cta">Hablemos <span class="cta-arrow">→</span></a>
  </div>
</section>
